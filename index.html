<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌸 สมุดจดบันทึกของฉัน | My Cute Notebook</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f472b6">
    <link rel="apple-touch-icon" href="icon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { 
            background-color: #fce7f3; 
            background-image: radial-gradient(#f9a8d4 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Kanit', sans-serif; 
        }
        
        .paper-card {
            background: #fff0f5;
            border: 2px dashed #fbcfe8;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(244, 114, 182, 0.2);
        }

        .entry-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 6px solid #f472b6; 
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.85);
        }
        .entry-card:hover { 
            transform: translateY(-3px) scale(1.01); 
            box-shadow: 0 10px 15px -3px rgba(244, 114, 182, 0.2);
            background: rgba(255, 255, 255, 1);
        }

        .btn-primary {
            @apply bg-gradient-to-r from-pink-400 to-rose-400 hover:from-pink-500 hover:to-rose-500 text-white font-medium py-2 px-5 rounded-2xl shadow-lg shadow-pink-200 transition-all duration-200 transform hover:scale-105;
        }
        .btn-outline {
            @apply border-2 border-pink-200 bg-white/70 text-pink-600 hover:bg-pink-50 rounded-2xl px-4 py-2 font-medium transition-all;
        }

        .category-tabs, .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #fbcfe8 transparent;
        }
        .category-tabs::-webkit-scrollbar, .custom-scrollbar::-webkit-scrollbar { 
            height: 6px; 
            width: 6px; 
        }
        .category-tabs::-webkit-scrollbar-thumb, .custom-scrollbar::-webkit-scrollbar-thumb { 
            background-color: #fbcfe8; 
            border-radius: 10px; 
        }
        .category-tabs { 
            overflow-x: auto; 
            white-space: nowrap; 
        }

        .icon-option {
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 46px;
            height: 46px;
            border-radius: 12px;
        }
        .icon-option:hover { 
            transform: scale(1.2); 
            background: #fce7f3; 
        }
        .icon-option.selected {
            background: #fbcfe8;
            transform: scale(1.2);
            box-shadow: 0 0 0 2px #f472b6;
        }
        
        .mic-btn.recording {
            color: #ef4444 !important;
            animation: pulse 1.5s infinite;
        }
        
        .speaker-btn.speaking {
            color: #3b82f6 !important;
            animation: pulse 1.5s infinite;
        }

        .loading-spinner {
            display: inline-block;
            width: 1rem; 
            height: 1rem;
            border: 2px solid #fbcfe8; 
            border-top-color: #f472b6;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        .fade-in-up { 
            animation: fadeInUp 0.3s ease-out; 
        }
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(20px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="text-gray-700 min-h-screen relative pb-6">

<div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex flex-wrap justify-between items-center mb-8 gap-4">
        <div class="flex items-center gap-4 bg-white/80 p-4 rounded-3xl shadow-sm border border-pink-100 flex-1 min-w-[300px]">
            <div class="bg-pink-100 p-3 rounded-2xl flex-shrink-0">
                <i class="fas fa-heart text-3xl text-pink-500"></i>
            </div>
            <div class="flex-1 w-full">
                <div class="flex items-center gap-2">
                    <h1 id="appTitle" class="text-2xl md:text-3xl font-bold text-rose-500 tracking-wide outline-none border-b-2 border-transparent focus:border-rose-300 transition-colors w-full max-w-[300px] truncate" contenteditable="false">My Notebook 🌸</h1>
                    <button id="editTitleBtn" class="text-pink-300 hover:text-pink-500 bg-white hover:bg-pink-50 rounded-full w-8 h-8 flex items-center justify-center transition shadow-sm border border-pink-100" title="เปลี่ยนชื่อแอป">
                        <i class="fas fa-pen text-xs"></i>
                    </button>
                </div>
                <p class="text-sm text-pink-400 font-medium mt-1">สมุดจดบันทึกส่วนตัว สไตล์คิวท์ๆ</p>
            </div>
        </div>
        
        <div class="flex gap-3 items-center">
            <div id="authButtons" class="flex gap-2">
                <button id="loginBtn" class="bg-white border-2 border-pink-100 hover:bg-pink-50 text-gray-700 font-medium py-2 px-5 rounded-2xl shadow-sm transition-all flex items-center gap-3">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5"> เข้าสู่ระบบ
                </button>
            </div>
            <div id="userInfo" class="hidden items-center gap-3 bg-white/80 px-4 py-2 rounded-full border border-pink-100 shadow-sm">
                <img id="userAvatar" class="w-8 h-8 rounded-full hidden border border-pink-200">
                <span id="userEmail" class="text-sm font-medium truncate max-w-[120px]"></span>
                <button id="logoutBtn" class="text-pink-400 hover:text-pink-600 text-sm font-medium ml-2">ออก</button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-5 xl:col-span-4 space-y-6">
            
            <div class="paper-card p-5">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-semibold text-lg flex items-center gap-2 text-rose-500">
                        <i class="fas fa-folder-open"></i> ชั้นวางสมุด
                    </h2>
                    <div class="flex items-center gap-2">
                        <div id="categoryActions" class="hidden flex gap-1">
                            <button onclick="openEditCategoryModal()" class="w-8 h-8 rounded-full bg-blue-50 text-blue-400 hover:text-blue-600 hover:bg-blue-100 transition shadow-sm" title="แก้ไขสมุด (ชื่อและไอคอน)">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteCategory()" class="w-8 h-8 rounded-full bg-red-50 text-red-400 hover:text-red-600 hover:bg-red-100 transition shadow-sm" title="ลบสมุดทิ้ง">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                        <button id="addCategoryBtn" class="text-sm bg-pink-100 hover:bg-pink-200 px-4 py-1.5 rounded-full flex items-center gap-2 text-pink-600 font-medium transition-colors shadow-sm">
                            <i class="fas fa-plus"></i> เพิ่ม
                        </button>
                    </div>
                </div>
                <div class="category-tabs flex flex-wrap gap-2 pb-2" id="categoryTabsContainer"></div>
            </div>

            <div class="paper-card p-6">
                <h2 class="font-semibold text-xl mb-5 flex items-center gap-2 text-rose-500">
                    <i class="fas fa-pen-fancy"></i> จดบันทึกใหม่ ✨
                </h2>
                <form id="noteForm">
                    <input type="hidden" id="editId" value="">
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2 text-gray-600">หัวข้อหลัก <span class="text-rose-500">*</span></label>
                        <div class="relative flex items-center">
                            <input type="text" id="mainTitleField" required class="w-full border-2 border-pink-100 rounded-2xl p-3 pr-20 bg-white focus:outline-none focus:border-pink-400 font-medium text-lg placeholder-pink-200" placeholder="พิมพ์หรือพูดหัวข้อ...">
                            <div class="absolute right-3 flex gap-2">
                                <button type="button" class="speaker-btn text-gray-400 hover:text-blue-500 text-lg transition-colors" data-target="mainTitleField" title="อ่านออกเสียง">
                                    <i class="fas fa-volume-up"></i>
                                </button>
                                <button type="button" class="mic-btn text-gray-400 hover:text-pink-500 text-lg transition-colors" data-target="mainTitleField" title="พิมพ์ด้วยเสียง">
                                    <i class="fas fa-microphone"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="block text-sm font-medium mb-2 text-gray-600">หมวดหมู่ย่อย <span class="text-xs text-gray-400 font-normal">(ไม่จำเป็นต้องใส่)</span></label>
                        <div class="relative flex items-center">
                            <input type="text" id="subCategoryField" list="subCategoryList" class="w-full border-2 border-pink-100 rounded-2xl p-2.5 pr-20 bg-white focus:outline-none focus:border-pink-400 font-medium text-sm placeholder-pink-200" placeholder="เช่น สี, สัตว์, เดือน...">
                            <div class="absolute right-3 flex gap-2">
                                <button type="button" class="speaker-btn text-gray-400 hover:text-blue-500 text-base transition-colors" data-target="subCategoryField" title="อ่านออกเสียง">
                                    <i class="fas fa-volume-up"></i>
                                </button>
                                <button type="button" class="mic-btn text-gray-400 hover:text-pink-500 text-base transition-colors" data-target="subCategoryField" title="พิมพ์ด้วยเสียง">
                                    <i class="fas fa-microphone"></i>
                                </button>
                            </div>
                        </div>
                        <datalist id="subCategoryList"></datalist>
                    </div>

                    <hr class="border-pink-100 mb-4">
                    
                    <div class="mb-5">
                        <label class="block text-sm font-medium mb-2 text-gray-600">แนบรูปภาพ</label>
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                        <button type="button" id="triggerImageBtn" class="w-full border-2 border-dashed border-pink-200 hover:bg-pink-50 text-pink-500 rounded-2xl py-3 flex justify-center items-center gap-2 transition-colors">
                            <i class="fas fa-image"></i> เลือกรูปภาพ
                        </button>
                        <div id="imagePreviewContainer" class="relative hidden mt-3">
                            <img id="imagePreview" class="w-full h-32 object-cover rounded-2xl border-2 border-pink-100 shadow-sm" src="" alt="Preview">
                            <button type="button" id="removeImageBtn" class="absolute top-2 right-2 bg-red-500 hover:bg-red-600 text-white rounded-full w-8 h-8 flex items-center justify-center shadow-md transform hover:scale-110" title="ลบรูปภาพ">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                    
                    <hr class="border-pink-100 mb-4">
                    
                    <div class="mb-2 flex justify-between items-center">
                        <label class="block text-sm font-medium text-gray-600">รายละเอียด</label>
                        <button type="button" id="addDynamicFieldBtn" class="text-xs bg-pink-50 hover:bg-pink-100 text-pink-600 px-3 py-1 rounded-full flex items-center gap-1 transition-colors">
                            <i class="fas fa-plus-circle"></i> เพิ่มช่อง
                        </button>
                    </div>
                    
                    <div id="dynamicFieldsContainer" class="space-y-3 mb-6">
                        </div>
                    
                    <div class="flex justify-between items-center gap-2 mt-6">
                        <button type="button" id="clearFormBtn" class="flex-1 bg-white border-2 border-orange-200 hover:bg-orange-50 text-orange-500 py-3 rounded-2xl flex justify-center items-center gap-2 font-medium transition-all shadow-sm">
                            <i class="fas fa-eraser"></i> ล้าง
                        </button>
                        <button type="button" id="cancelEditBtn" class="hidden flex-1 bg-white border-2 border-gray-200 hover:bg-gray-50 text-gray-500 py-3 rounded-2xl flex justify-center items-center gap-2 font-medium transition-all shadow-sm">
                            <i class="fas fa-times"></i> ยกเลิก
                        </button>
                        <button type="submit" class="flex-[1.5] bg-gradient-to-r from-emerald-400 to-teal-400 text-white py-3 rounded-2xl flex justify-center items-center gap-2 font-medium transition-all shadow-lg transform hover:scale-105">
                            <i class="fas fa-save"></i> <span id="submitBtnText">บันทึก</span>
                        </button>
                    </div>
                </form>
            </div>

            <div id="translationToolContainer" class="paper-card p-6 hidden">
                <h3 class="font-semibold text-lg flex items-center gap-2 text-sky-500 mb-3">
                    <i class="fas fa-language"></i> แปลภาษา & ออกเสียง
                </h3>
                <div class="relative mb-3 flex items-center">
                    <textarea id="autoTranslateInput" rows="2" class="w-full border-2 border-pink-100 rounded-2xl p-3 pr-16 bg-white focus:outline-none focus:border-pink-400 resize-none text-sm" placeholder="พิมพ์..."></textarea>
                    <div class="absolute right-2 top-3 flex gap-2">
                        <button type="button" class="speaker-btn text-gray-400 hover:text-blue-500 transition-colors" data-target="autoTranslateInput" title="อ่านออกเสียง">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <button type="button" class="mic-btn text-gray-400 hover:text-pink-500 transition-colors" data-target="autoTranslateInput" title="พิมพ์ด้วยเสียง">
                            <i class="fas fa-microphone"></i>
                        </button>
                    </div>
                </div>
                <div class="space-y-2 mt-3 text-sm">
                    <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 relative min-h-[48px] flex items-center">
                        <div class="flex-1 pr-8"><span class="font-medium text-blue-600">🇬🇧 </span><span id="autoEnResult">-</span></div>
                        <button class="absolute right-3 text-blue-400 hover:text-blue-600 w-8 h-8 rounded-full" onclick="speakTextFromElement('autoEnResult', 'en-US')"><i class="fas fa-volume-up"></i></button>
                    </div>
                    <div class="bg-red-50 p-3 rounded-xl border border-red-100 relative min-h-[48px] flex items-center">
                        <div class="flex-1 pr-8"><span class="font-medium text-red-600">🇨🇳 </span><span id="autoZhResult">-</span></div>
                        <button class="absolute right-3 text-red-400 hover:text-red-600 w-8 h-8 rounded-full" onclick="speakTextFromElement('autoZhResult', 'zh-CN')"><i class="fas fa-volume-up"></i></button>
                    </div>
                    <div class="bg-green-50 p-3 rounded-xl border border-green-100 relative min-h-[48px] flex items-center">
                        <div class="flex-1 pr-8"><span class="font-medium text-green-600">🇹🇭 </span><span id="autoThResult">-</span></div>
                        <button class="absolute right-3 text-green-400 hover:text-green-600 w-8 h-8 rounded-full" onclick="speakTextFromElement('autoThResult', 'th-TH')"><i class="fas fa-volume-up"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 xl:col-span-8 space-y-6">
            <div class="paper-card p-5 h-full">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4 bg-white/50 p-3 rounded-2xl border border-pink-50">
                    <h2 class="font-semibold text-xl flex items-center gap-2 text-rose-500">
                        <i class="fas fa-book-open text-pink-400"></i> 
                        <span id="selectedCategoryName" class="text-gray-800">บันทึกทั้งหมด</span>
                    </h2>
                    
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <div class="relative flex-1 sm:flex-none">
                            <select id="viewModeSelector" class="w-full appearance-none bg-white border border-pink-200 hover:border-pink-300 rounded-xl px-4 py-2 pr-8 text-sm focus:outline-none text-pink-600 font-medium shadow-sm transition cursor-pointer">
                                <option value="content">📝 รูปแบบเนื้อหา</option>
                                <option value="details">📄 รายละเอียด</option>
                                <option value="tiles">🪟 กระเบื้อง</option>
                                <option value="list">🔠 รายการย่อ</option>
                                <option value="xlarge">🖼️ ไอคอนใหญ่พิเศษ</option>
                                <option value="large">🖼️ ไอคอนใหญ่</option>
                                <option value="medium">🖼️ ไอคอนกลาง</option>
                                <option value="small">🖼️ ไอคอนเล็ก</option>
                            </select>
                            <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-pink-400 pointer-events-none text-xs"></i>
                        </div>
                        
                        <div class="relative flex-1 sm:flex-none flex items-center">
                            <i class="fas fa-search absolute left-3 text-pink-300 text-sm"></i>
                            <input type="text" id="searchNote" placeholder="ค้นหา..." class="w-full sm:w-48 pl-9 pr-14 py-2 border border-pink-200 rounded-xl text-sm bg-white focus:outline-none focus:border-pink-400 transition-colors shadow-sm">
                            <div class="absolute right-2 flex gap-1">
                                <button type="button" class="speaker-btn text-gray-400 hover:text-blue-500" data-target="searchNote">
                                    <i class="fas fa-volume-up text-sm"></i>
                                </button>
                                <button type="button" class="mic-btn text-gray-400 hover:text-pink-500" data-target="searchNote">
                                    <i class="fas fa-microphone text-sm"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="subCategoryTabsContainer" class="flex gap-2 overflow-x-auto custom-scrollbar pb-2 mb-4 hidden">
                    </div>
                
                <div id="notesListContainer" class="max-h-[800px] overflow-y-auto pr-2 custom-scrollbar pb-6">
                    <div class="text-center text-pink-300 py-20 flex flex-col items-center">
                        <i class="fas fa-book-heart text-6xl mb-4"></i>
                        <p class="text-lg">เลือกสมุดเพื่อดูบันทึกของคุณ 📝</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="mt-8 text-center pb-8">
        <button id="clearCacheBtn" class="text-gray-400 hover:text-pink-500 text-sm transition-colors flex items-center justify-center gap-2 mx-auto bg-white/50 hover:bg-white px-5 py-2.5 rounded-full border border-pink-100 shadow-sm font-medium">
            <i class="fas fa-sync-alt"></i> ล้างแคชและอัปเดตเวอร์ชัน
        </button>
    </div>
</div>

<div id="previewModal" class="modal-backdrop hidden fixed inset-0 bg-pink-900/60 backdrop-blur-md flex items-center justify-center z-[70] p-4" onclick="closePreviewModal()">
    <div class="bg-white rounded-[2rem] w-full max-w-2xl shadow-2xl transform transition-all border-4 border-pink-50 max-h-[90vh] flex flex-col fade-in-up" onclick="event.stopPropagation()">
        <div class="p-6 border-b border-pink-50 flex justify-between items-start bg-pink-50/30 rounded-t-[1.8rem]">
            <div class="flex-1 pr-4">
                <div class="flex items-center gap-2 mb-2">
                    <h2 id="previewModalTitle" class="text-3xl font-bold text-gray-800 leading-tight">หัวข้อ...</h2>
                    <button id="previewTitleSpeaker" type="button" class="text-blue-400 hover:text-blue-600 transition-colors w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
                <div id="previewModalSubCat" class="hidden flex items-center gap-2">
                    <span id="previewModalSubCatText" class="bg-indigo-50 text-indigo-500 text-xs px-2.5 py-1 rounded-lg border border-indigo-100 inline-flex items-center font-medium">
                        <i class="fas fa-tag mr-1.5"></i><span></span>
                    </span>
                    <button id="previewSubCatSpeaker" type="button" class="text-blue-400 hover:text-blue-600 transition-colors w-6 h-6 rounded-full bg-white shadow-sm flex items-center justify-center text-xs">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
            </div>
            <button onclick="closePreviewModal()" class="text-gray-400 hover:text-pink-500 text-2xl transition bg-white w-10 h-10 rounded-full shadow-sm flex items-center justify-center flex-shrink-0">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="p-6 overflow-y-auto custom-scrollbar flex-1">
            <div id="previewModalImageContainer" class="mb-6 hidden text-center">
                <img id="previewModalImage" src="" class="max-w-full max-h-80 object-contain rounded-2xl mx-auto shadow-md border-2 border-pink-50 cursor-pointer" onclick="openImageViewer(this.src)" title="ดูรูปเต็ม">
            </div>
            <div id="previewModalFields" class="space-y-4">
                </div>
        </div>
        
        <div class="p-4 border-t border-pink-50 bg-gray-50 rounded-b-[1.8rem] flex justify-end">
            <button id="previewEditBtn" class="bg-blue-50 hover:bg-blue-100 text-blue-600 px-6 py-2 rounded-xl font-medium transition shadow-sm flex items-center gap-2">
                <i class="fas fa-pen"></i> แก้ไขหน้านี้
            </button>
        </div>
    </div>
</div>

<div id="categoryModal" class="modal-backdrop hidden fixed inset-0 bg-pink-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl transform transition-all border-4 border-pink-50 flex flex-col items-center relative fade-in-up">
        <button id="closeCategoryX" class="absolute top-6 right-6 text-gray-400 hover:text-pink-500 text-xl"><i class="fas fa-times"></i></button>
        <h3 id="categoryModalTitle" class="text-2xl font-bold text-rose-500 mb-6">เพิ่มสมุดเล่มใหม่ 📚</h3>
        
        <div class="mb-6 flex flex-col items-center group relative">
            <button type="button" onclick="openGlobalIconPicker('categoryModal')" class="w-28 h-28 bg-pink-50 hover:bg-pink-100 rounded-full border-4 border-pink-200 flex items-center justify-center text-6xl transition-transform hover:scale-105 shadow-sm overflow-hidden z-10">
                <span id="categoryIconPreview">🌸</span>
            </button>

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; 
                const MAX_HEIGHT = 800;
                let width = img.width; 
                let height = img.height;
                
                if (width > height) { 
                    if (width > MAX_WIDTH) { 
                        height *= MAX_WIDTH / width; 
                        width = MAX_WIDTH; 
                    } 
                } else { 
                    if (height > MAX_HEIGHT) { 
                        width *= MAX_HEIGHT / height; 
                        height = MAX_HEIGHT; 
                    } 
                }
                canvas.width = width; 
                canvas.height = height;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                currentImageBase64 = canvas.toDataURL('image/jpeg', 0.7); 
                imagePreview.src = currentImageBase64;
                imagePreviewContainer.classList.remove('hidden');

            img.src = event.target.result;

                    return; 
                }
                const targetId = newBtn.getAttribute('data-target');
                const targetInput = document.getElementById(targetId) || newBtn.previousElementSibling;
                
                if (newBtn.classList.contains('recording')) return;
                
                const recognition = new SpeechRecognition();
                recognition.lang = 'th-TH'; 
                recognition.interimResults = false;
                recognition.start(); 
                newBtn.classList.add('recording');
                
                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    const currentValue = targetInput.value;
                    targetInput.value = currentValue ? currentValue + " " + transcript : transcript;
                    targetInput.dispatchEvent(new Event('input')); 
                };
                
                recognition.onend = function() {
                    newBtn.classList.remove('recording');
                };
                
                recognition.onerror = function() {
                    newBtn.classList.remove('recording');
                };
            });
        });
    }

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = detectLanguageBasic(text) === 'th' ? 'th-TH' : 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

                    return;

                const targetId = newBtn.getAttribute('data-target');
                let textToSpeak = "";
                
                if (targetId) {
                    const targetEl = document.getElementById(targetId);
                    if(targetEl) textToSpeak = targetEl.value || targetEl.innerText;
                }

                if (!textToSpeak || textToSpeak.trim() === "") return;
                
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = detectLanguageBasic(textToSpeak) === 'th' ? 'th-TH' : 'en-US';
                utterance.rate = 0.9;
                
                newBtn.classList.add('speaking');
                
                utterance.onend = function() { newBtn.classList.remove('speaking'); };
                utterance.onerror = function() { newBtn.classList.remove('speaking'); };
                
                window.speechSynthesis.speak(utterance);
            });
        });
    }

    function speakTextFromElement(elementId, lang) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        
        const text = document.getElementById(elementId).innerText;
        if (!text || text === '-' || text.includes('loading-spinner')) return;
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang; 
        utterance.rate = 0.9; 
        window.speechSynthesis.speak(utterance);
    }


    // ----------------------------------------------------
    // ส่วนที่ 9: ฟังก์ชันแปลภาษา Google Translate
    // ----------------------------------------------------
    function detectLanguageBasic(text) {
        if (/[\u0E00-\u0E7F]/.test(text)) return 'th';
        if (/[\u4E00-\u9FFF]/.test(text)) return 'zh'; 
        return 'en';
    }
    
    async function translateText(text, srcLang, tgtLang) {
        if (!text) return "";
        const key = `${srcLang}|${tgtLang}|${text}`;
        if (translationCache[key]) return translationCache[key];
        
        const src = srcLang === 'zh' ? 'zh-CN' : srcLang; 
        const tgt = tgtLang === 'zh' ? 'zh-CN' : tgtLang;
        
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${tgt}&dt=t&q=${encodeURIComponent(text)}`;
        
        try {
            const res = await fetch(url); 
            const data = await res.json();
            if (data && data[0]) {
                let trans = data[0].map(item => item[0]).join('');
                if (trans === text && src !== tgt) trans = null;
                if (trans) translationCache[key] = trans; 
                return trans || "";
            }
            return "";
        } catch(e) { return ""; }
    }
    
    async function autoTranslate() {
        const raw = autoTranslateInput.value.trim();
        if (!raw) { 
            autoEnResult.innerText = "-"; 
            autoZhResult.innerText = "-"; 
            autoThResult.innerText = "-"; 
            return; 
        }
        
        const spinner = '<span class="loading-spinner"></span>';
        autoEnResult.innerHTML = spinner; 
        autoZhResult.innerHTML = spinner; 
        autoThResult.innerHTML = spinner;
        
        const detected = detectLanguageBasic(raw);
        let en = "", zh = "", th = "";
        
        if (detected === 'th') { 
            th = raw; 
            en = await translateText(raw, 'th', 'en'); 
            zh = await translateText(raw, 'th', 'zh'); 
        } else if (detected === 'en') { 
            en = raw; 
            th = await translateText(raw, 'en', 'th'); 
            zh = await translateText(raw, 'en', 'zh'); 
        } else { 
            zh = raw; 
            th = await translateText(raw, 'zh', 'th'); 
            en = await translateText(raw, 'zh', 'en'); 
        }
        
        autoEnResult.innerText = en || "-"; 
        autoZhResult.innerText = zh || "-"; 
        autoThResult.innerText = th || "-";
    }

    autoTranslateInput.addEventListener('input', function() {
        if (autoTranslateDebounce) clearTimeout(autoTranslateDebounce);
        autoTranslateDebounce = setTimeout(autoTranslate, 500);
    });

    function renderNotesList() {
        const filtered = noteEntries.filter(function(entry) {
            const matchTitle = entry.title?.toLowerCase().includes(searchTerm.toLowerCase());
            const matchFields = entry.fields && entry.fields.some(function(f) {
                return (f.label && f.label.toLowerCase().includes(searchTerm.toLowerCase())) || 
                       (f.value && f.value.toLowerCase().includes(searchTerm.toLowerCase()));
            });
            const matchSearch = matchTitle || matchFields;
            
            const matchSub = currentSubCategoryFilter === 'all' || entry.subCategory === currentSubCategoryFilter;

            return matchSearch && matchSub;
        });

        if (filtered.length === 0) {

        else if (currentViewMode === 'tiles') gridClass = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4';
        else if (currentViewMode === 'xlarge') gridClass = 'grid grid-cols-1 sm:grid-cols-2 gap-6';
        else if (currentViewMode === 'large') gridClass = 'grid grid-cols-2 sm:grid-cols-3 gap-5';
        else if (currentViewMode === 'medium') gridClass = 'grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 gap-4';
        else if (currentViewMode === 'small') gridClass = 'grid grid-cols-4 sm:grid-cols-5 lg:grid-cols-6 gap-3';

    function getCardClass(mode) {
        const base = "relative group cursor-pointer transition-all bg-white hover:bg-pink-50/50 ";
        if (mode === 'content') return base + "p-5 rounded-2xl border border-pink-100 shadow-sm hover:shadow-md note-card-item flex flex-col sm:flex-row gap-5";
        if (mode === 'list') return base + "p-3 rounded-xl border border-pink-50 shadow-sm flex items-center gap-3 note-card-item";
        if (mode === 'details') return base + "p-3 border-b border-pink-50 flex items-center justify-between note-card-item rounded-none shadow-none";
        if (mode === 'tiles') return base + "p-4 rounded-xl border border-pink-100 shadow-sm flex items-center gap-4 note-card-item h-28";
        return base + "p-3 sm:p-4 rounded-xl border border-pink-100 shadow-sm flex flex-col items-center text-center note-card-item h-full";
    }

    // รวบรวมข้อความทั้งหมดในการ์ดสำหรับปุ่มอ่านออกเสียงบนการ์ด
    function compileFullTextForSpeaker(entry) {
        let text = entry.title + ". ";
        if (entry.subCategory) text += "หมวดหมู่: " + entry.subCategory + ". ";
        if (entry.fields && entry.fields.length > 0) {
            entry.fields.forEach(function(f) {
                if(f.label) text += f.label + ": ";
                if(f.value) text += f.value + ". ";
            });
        }
        return encodeURIComponent(text);
    }

    function generateCardHTML(entry, mode) {
        const title = escapeHtml(entry.title || 'ไม่มีหัวข้อ');
        const icon = entry.fields?.[0]?.icon || '✨';
        const imgDisplay = entry.image 
            ? `<img src="${entry.image}" class="w-full h-full object-cover">`
            : `<div class="w-full h-full bg-pink-50 flex items-center justify-center text-opacity-50"><span class="scale-150">${icon}</span></div>`;
        
        // ป้ายหมวดหมู่ย่อย
        const subCatBadge = entry.subCategory ? `<span class="bg-indigo-50 text-indigo-500 text-[11px] px-2 py-0.5 rounded-lg border border-indigo-100 ml-2 align-middle font-medium whitespace-nowrap"><i class="fas fa-tag mr-1 text-[10px]"></i>${escapeHtml(entry.subCategory)}</span>` : '';

        // ข้อมูลรายละเอียดแบบย่อ สำหรับมุมมองต่างๆ
        let firstFieldValue = "";
        let detailsSnippet = "";
        if (entry.fields && entry.fields.length > 0) {
            firstFieldValue = escapeHtml(entry.fields[0].value || entry.fields[0].label || "");
            const allText = entry.fields.map(f => `${f.label ? f.label+': ' : ''}${f.value}`).join(' | ');
            detailsSnippet = escapeHtml(allText);
        }

        // ปุ่มเครื่องมือบนการ์ด (แก้ไข, ลบ, ลำโพง)
        const fullTextSafe = compileFullTextForSpeaker(entry);
        const btnHTML = `
            <div class="flex gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity ${mode === 'details' || mode === 'list' ? '' : 'absolute right-2 top-2 bg-white/90 p-1 rounded-lg backdrop-blur-sm shadow-sm border border-pink-50 z-10'}">
                <button type="button" onclick="speakRawText(decodeURIComponent('${fullTextSafe}')); event.stopPropagation();" class="w-8 h-8 rounded-md text-blue-400 hover:bg-blue-50 hover:text-blue-600 flex items-center justify-center transition" title="อ่านเนื้อหาการ์ดนี้">
                    <i class="fas fa-volume-up text-sm pointer-events-none"></i>

                <button type="button" class="delete-note w-8 h-8 rounded-md text-red-400 hover:bg-red-50 hover:text-red-600 flex items-center justify-center transition" data-id="${entry.id}">
                    <i class="fas fa-trash-alt text-sm pointer-events-none"></i>
                </button>
            </div>
        `;

        if (mode === 'content') {
            let fieldsHtml = '';
            if (entry.fields && entry.fields.length > 0) {
                fieldsHtml = `<div class="mt-4 space-y-3 border-t border-pink-100 pt-4">`;
                entry.fields.forEach(function(f) {
                    if (f.label || f.value) {
                        const colorCode = f.color || 'pink';
                        const colorStyle = colorMap[colorCode] || colorMap['pink'];
                        const iconHtml = f.icon ? `<span class="mr-1.5 text-lg">${escapeHtml(f.icon)}</span>` : '';

                        fieldsHtml += `
                            <div class="text-sm">
                                ${f.label ? `<span class="font-medium ${colorStyle.badgeBg} ${colorStyle.badgeText} px-2.5 py-1 rounded-lg inline-flex items-center mb-1.5 shadow-sm">${iconHtml}${escapeHtml(f.label)}</span>` : ''}
                                <div class="text-gray-700 pl-1 whitespace-pre-wrap leading-relaxed">${escapeHtml(f.value)}</div>
                            </div>`;
                    }
                });
                fieldsHtml += `</div>`;
            }
            let imageHtml = '';
            if (entry.image) {
                imageHtml = `<div class="w-full sm:w-40 h-40 flex-shrink-0 mt-3 sm:mt-0 rounded-xl overflow-hidden border border-pink-100 shadow-sm">${imgDisplay}</div>`;
            }

            return `
                <div class="flex-1 pr-4 min-w-0">
                    <div class="font-bold text-xl text-gray-800 flex items-center flex-wrap gap-1 mb-2">✨ <span class="truncate max-w-full">${title}</span> ${subCatBadge}</div>

        }
        
        if (mode === 'list') {
            return `

                <div class="flex-1 min-w-0 flex flex-col justify-center">
                    <div class="font-bold text-gray-800 truncate text-base flex items-center">${title} ${subCatBadge}</div>
                    <div class="text-xs text-gray-500 truncate w-full pr-4">${detailsSnippet}</div>

        if (mode === 'details') {

        if (mode === 'tiles') {

            if (entry.fields && entry.fields.length > 0) {
                const limitedFields = entry.fields.slice(0, 2); // โชว์แค่ 2 บรรทัด
                tileDetails = limitedFields.map(f => `• ${f.label ? escapeHtml(f.label)+': ' : ''}${escapeHtml(f.value)}`).join('<br>');

        if(mode === 'xlarge') sizeClass = "w-32 h-32 sm:w-48 sm:h-48 text-6xl";
        if(mode === 'large') sizeClass = "w-24 h-24 sm:w-32 sm:h-32 text-5xl";
        if(mode === 'medium') sizeClass = "w-16 h-16 sm:w-24 sm:h-24 text-4xl";
        
        return `

            ${(mode === 'xlarge' || mode === 'large') ? `<div class="text-xs text-gray-500 mt-1 truncate w-full px-2">${firstFieldValue}</div>` : ''}
            ${btnHTML}
        `;
    }

                        <div class="text-gray-700 whitespace-pre-wrap leading-relaxed pl-1">${escapeHtml(f.value)}</div>
                        <button type="button" onclick="speakRawText(decodeURIComponent('${valueTextForSpeaker}'))" class="speaker-btn absolute right-3 top-3 text-blue-400 hover:text-blue-600 w-8 h-8 rounded-full transition-colors flex items-center justify-center bg-white shadow-sm hover:shadow" title="อ่านรายละเอียดนี้">
                            <i class="fas fa-volume-up"></i>
                        </button>
                    `;
                    fieldsCont.appendChild(fieldBox);
                }
            });
            // ใส่ระบบอ่านออกเสียงใน Modal ด้วย
            attachSpeakerEvents();
        } else {
            fieldsCont.innerHTML = `<div class="text-gray-400 italic text-center py-4">ไม่มีรายละเอียดเพิ่มเติม</div>`;
        }

        previewEditBtn.onclick = function() {
            closePreviewModal();
            fillFormForEdit(entry);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        previewModal.classList.remove('hidden');
    }

    function closePreviewModal() {
        previewModal.classList.add('hidden');
        window.speechSynthesis.cancel(); // หยุดอ่านเมื่อปิดหน้าต่าง
    }


    // ----------------------------------------------------
    // ส่วนที่ 12: การจัดการฟอร์มแก้ไขและบันทึก
    // ----------------------------------------------------
    function fillFormForEdit(entry) {
        editIdInput.value = entry.id;
        mainTitleField.value = entry.title || '';
        subCategoryField.value = entry.subCategory || '';
        
        if (entry.image) {
            currentImageBase64 = entry.image;
            imagePreview.src = currentImageBase64;
            imagePreviewContainer.classList.remove('hidden');
            triggerImageBtn.classList.add('hidden');
        } else {
            currentImageBase64 = "";
            imageInput.value = "";
            imagePreviewContainer.classList.add('hidden');
            triggerImageBtn.classList.remove('hidden');
        }

        dynamicFieldsContainer.innerHTML = ''; 
        if (entry.fields && entry.fields.length > 0) {
            entry.fields.forEach(function(f) {
                dynamicFieldsContainer.appendChild(createFieldRow(f.label, f.value, f.icon || "✨", f.color || "pink"));
            });
        } else {
            resetDynamicFields();
        }
        
        cancelEditBtn.classList.remove('hidden');
        submitBtnText.innerText = "อัปเดต";
        
        attachMicEvents();
        attachSpeakerEvents();
    }

    function clearForm() {
        editIdInput.value = '';
        mainTitleField.value = '';
        subCategoryField.value = '';
        
        currentImageBase64 = "";
        imageInput.value = "";
        imagePreviewContainer.classList.add('hidden');
        triggerImageBtn.classList.remove('hidden');

        resetDynamicFields();
        cancelEditBtn.classList.add('hidden');
        submitBtnText.innerText = "บันทึก";
        window.speechSynthesis.cancel();
    }

    noteForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        if (!currentUser) { alert("กรุณาเข้าสู่ระบบก่อนจดบันทึกน้า 💖"); return; }
        if (!selectedCategoryId) { alert("เลือกสมุดก่อนนะคะ 📚"); return; }
        
        const title = mainTitleField.value.trim();
        if (!title) { alert("อย่าลืมตั้งหัวข้อหลักด้วยนะคะ ✨"); return; }

        const subCat = subCategoryField.value.trim();
        const fields = [];
        const currentLabels = [];
        const rows = document.querySelectorAll('.dynamic-field-row');
        
        rows.forEach(function(row) {
            const label = row.querySelector('.field-label').value.trim();
            const value = row.querySelector('.field-value').value.trim();
            const iconBtn = row.querySelector('.field-icon-btn');
            const icon = iconBtn ? iconBtn.getAttribute('data-icon') : "✨";
            const color = row.getAttribute('data-selected-color') || "pink";

            if (label || value) { 
                fields.push({ label, value, icon, color });
                if (label && !currentLabels.some(l => l.label === label)) {
                    currentLabels.push({ label, icon, color });
                }
            }
        });

        const data = {
            title: title,
            subCategory: subCat,
            fields: fields,
            image: currentImageBase64,
            categoryId: selectedCategoryId,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        const id = editIdInput.value;
        const submitBtn = noteForm.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        submitBtn.disabled = true;

        try {
            if (id) {
                await db.collection('users').doc(currentUser.uid).collection('diaryEntries').doc(id).update(data);
            } else {
                data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection('users').doc(currentUser.uid).collection('diaryEntries').add(data);
            }
            
            if (currentLabels.length > 0) {
                await db.collection('users').doc(currentUser.uid).collection('diaryCategories').doc(selectedCategoryId).update({
                    fieldLabels: currentLabels
                });
                const catIndex = categories.findIndex(c => c.id === selectedCategoryId);
                if (catIndex > -1) {
                    categories[catIndex].fieldLabels = currentLabels;
                }
            }
            
            clearForm();
            loadNotes();
            
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        } catch(err) {
            console.error(err);
            alert("บันทึกไม่สำเร็จ อาจเป็นเพราะรูปภาพใหญ่เกินไป ลองเลือกรูปใหม่ดูนะคะ 🥺");
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    });


    // ----------------------------------------------------
    // ส่วนที่ 13: การจัดการสมุดหมวดหมู่และการจำสมุดล่าสุด
    // ----------------------------------------------------
    
    // ตั้งค่าตัวแปรจำสมุดสำหรับแต่ละ User
    function getStorageKeyForNotebook() {
        if (!currentUser) return null;
        return 'cute_notebook_last_cat_' + currentUser.uid;
    }

    function openCategoryModal() {
        if (!currentUser) { 
            alert("กรุณาเข้าสู่ระบบก่อนสร้างสมุดนะคะ 💖"); 
            return; 
        }
        isEditingCategory = false;
        categoryModalTitle.innerText = "เพิ่มสมุดเล่มใหม่ 📚";
        confirmCategoryBtn.innerText = "สร้างสมุดเลย!";
        newCategoryNameInput.value = '';
        selectedIcon = "🌸"; 
        if(categoryIconPreview) categoryIconPreview.innerText = "🌸";
        document.getElementById('categoryModal').classList.remove('hidden');
    }

    function openEditCategoryModal() {
        if (!currentUser || !selectedCategoryId) return;
        const cat = categories.find(c => c.id === selectedCategoryId);
        if (!cat) return;
        
        isEditingCategory = true;
        categoryModalTitle.innerText = "แก้ไขสมุด ✏️";
        confirmCategoryBtn.innerText = "อัปเดตสมุด!";
        newCategoryNameInput.value = cat.name;
        selectedIcon = cat.icon || "🌸"; 
        if(categoryIconPreview) categoryIconPreview.innerText = selectedIcon;
        
        document.getElementById('categoryModal').classList.remove('hidden');
    }

    function closeCategoryModal() { 
        document.getElementById('categoryModal').classList.add('hidden'); 
    }

    async function saveCategory() {
        if (!currentUser) { 
            alert("กรุณาเข้าสู่ระบบก่อนนะคะ 💖"); 
            return; 
        }
        const name = newCategoryNameInput.value.trim();
        if (!name) { 
            alert("ตั้งชื่อสมุดสักหน่อยนะคะ 🥺"); 
            return; 
        }
        
        if (isEditingCategory && selectedCategoryId) {
            // โหมดอัปเดต
            await db.collection('users').doc(currentUser.uid).collection('diaryCategories').doc(selectedCategoryId).update({
                name: name,
                icon: selectedIcon
            });
            const catIndex = categories.findIndex(c => c.id === selectedCategoryId);
            if (catIndex > -1) {
                categories[catIndex].name = name;
                categories[catIndex].icon = selectedIcon;
            }
            renderCategoryTabs();
            loadNotes(); 
            closeCategoryModal();
        } else {
            // โหมดสร้างใหม่
            let defaultFields = [{label: "รายละเอียด", icon: "✨", color: "pink"}];
            if (name.includes('ภาษา') || name.includes('แปล') || name.includes('ศัพท์')) { 
                defaultFields = [
                    {label: "คำศัพท์", icon: "💬", color: "blue"}, 
                    {label: "คำอ่าน", icon: "🗣️", color: "emerald"}, 
                    {label: "ความหมาย", icon: "📖", color: "pink"}
                ]; 
            }
            
            const newCat = { 
                name: name, 
                icon: selectedIcon, 
                fieldLabels: defaultFields, 
                createdAt: firebase.firestore.FieldValue.serverTimestamp() 
            };
            const ref = await db.collection('users').doc(currentUser.uid).collection('diaryCategories').add(newCat);
            
            categories.push({ id: ref.id, name: name, icon: selectedIcon, fieldLabels: defaultFields });
            
            selectedCategoryId = ref.id; 
            
            const storageKey = getStorageKeyForNotebook();
            if (storageKey) localStorage.setItem(storageKey, ref.id);
            
            renderCategoryTabs(); 
            loadNotes(); 
            clearForm(); 
            closeCategoryModal();
        }
    }

    async function loadCategories() {
        if (!currentUser) return;
        const snap = await db.collection('users').doc(currentUser.uid).collection('diaryCategories').orderBy('createdAt').get();
        categories = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        if (categories.length === 0) {
            const batch = db.batch();
            
            const catRef1 = db.collection('users').doc(currentUser.uid).collection('diaryCategories').doc();
            batch.set(catRef1, { name: "สมุดโน้ตทั่วไป", icon: "🌸", fieldLabels: [{label: "รายละเอียด", icon: "✨", color: "pink"}], createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            
            const catRef2 = db.collection('users').doc(currentUser.uid).collection('diaryCategories').doc();
            batch.set(catRef2, { name: "สมุดจดภาษา", icon: "🌐", fieldLabels: [{label: "คำศัพท์", icon: "💬", color: "blue"}, {label: "คำอ่าน", icon: "🗣️", color: "emerald"}, {label: "ความหมาย", icon: "📖", color: "pink"}], createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            
            await batch.commit();
            categories = [
                { id: catRef1.id, name: "สมุดโน้ตทั่วไป", icon: "🌸", fieldLabels: [{label: "รายละเอียด", icon: "✨", color: "pink"}] },
                { id: catRef2.id, name: "สมุดจดภาษา", icon: "🌐", fieldLabels: [{label: "คำศัพท์", icon: "💬", color: "blue"}, {label: "คำอ่าน", icon: "🗣️", color: "emerald"}, {label: "ความหมาย", icon: "📖", color: "pink"}] }
            ];
        }
        
        // ดึงค่าสมุดล่าสุดที่จำไว้ของ User นี้มาใช้งาน
        const storageKey = getStorageKeyForNotebook();
        let savedCategoryId = null;
        if (storageKey) {
            savedCategoryId = localStorage.getItem(storageKey);
        }
        
        if (savedCategoryId && categories.some(c => c.id === savedCategoryId)) {
            selectedCategoryId = savedCategoryId;
        } else if (categories.length > 0) {
            selectedCategoryId = categories[0].id;
        }
        
        renderCategoryTabs();
        if (selectedCategoryId) { 
            loadNotes(); 
            resetDynamicFields(); 
        }
    }

    function renderCategoryTabs() {
        categoryTabsContainer.innerHTML = '';
        categories.forEach(function(cat) {
            const btn = document.createElement('button');
            const isSelected = selectedCategoryId === cat.id;
            btn.className = `flex items-center gap-2 px-4 py-2 rounded-2xl text-sm font-medium transition-all duration-200 border-2 shadow-sm flex-shrink-0 ${
                isSelected ? 'bg-pink-100 border-pink-300 text-pink-700 transform scale-105' : 'bg-white border-transparent text-gray-600 hover:bg-pink-50'
            }`;
            btn.innerHTML = `<span class="text-xl">${cat.icon || '🌸'}</span> <span class="whitespace-nowrap">${cat.name}</span>`;
            
            btn.onclick = function() {
                selectedCategoryId = cat.id;
                
                // บันทึกการเลือกหมวดหมู่ลง LocalStorage
                const storageKey = getStorageKeyForNotebook();
                if (storageKey) localStorage.setItem(storageKey, cat.id);
                
                currentSubCategoryFilter = 'all'; 
                
                renderCategoryTabs();
                loadNotes();
                clearForm();
            };
            categoryTabsContainer.appendChild(btn);
        });
    }

    async function deleteCategory() {
        if (!selectedCategoryId) return;
        if (!confirm("⚠️ แน่ใจไหมว่าจะลบสมุดเล่มนี้?\nบันทึกทุกหน้าในสมุดเล่มนี้จะหายไปทั้งหมดเลยนะ 🥺")) return;
        
        const notesSnap = await db.collection('users').doc(currentUser.uid).collection('diaryEntries').where('categoryId', '==', selectedCategoryId).get();
        const batch = db.batch();
        notesSnap.forEach(function(doc) {
            batch.delete(doc.ref);
        });
        
        batch.delete(db.collection('users').doc(currentUser.uid).collection('diaryCategories').doc(selectedCategoryId));
        await batch.commit();
        
        selectedCategoryId = null; 
        
        const storageKey = getStorageKeyForNotebook();
        if (storageKey) localStorage.removeItem(storageKey);
        
        categoryActionsDiv.classList.add('hidden'); 
        translationToolContainer.classList.add('hidden');
        loadCategories();
    }

    // ฟังก์ชันจัดการแท็บหมวดหมู่ย่อย (Sub-Category Tabs)
    function updateSubCategoryTabs() {
        const container = document.getElementById('subCategoryTabsContainer');
        const datalist = document.getElementById('subCategoryList');
        
        const subs = new Set();
        noteEntries.forEach(function(e) { 
            if (e.subCategory) subs.add(e.subCategory); 
        });
        const uniqueSubs = Array.from(subs).sort();
        
        datalist.innerHTML = uniqueSubs.map(s => `<option value="${escapeHtml(s)}">`).join('');
        
        if (uniqueSubs.length === 0) {
            container.classList.add('hidden');
            container.innerHTML = '';
            return;
        }
        
        container.classList.remove('hidden');
        let tabsHtml = `<button class="sub-cat-btn ${currentSubCategoryFilter === 'all' ? 'bg-pink-500 text-white' : 'bg-pink-50 text-pink-600 hover:bg-pink-100'} px-4 py-1.5 rounded-full text-sm font-medium transition shadow-sm whitespace-nowrap" data-sub="all">ทั้งหมด</button>`;
        
        uniqueSubs.forEach(function(sub) {
            const isSelected = currentSubCategoryFilter === sub;
            tabsHtml += `<button class="sub-cat-btn ${isSelected ? 'bg-pink-500 text-white' : 'bg-pink-50 text-pink-600 hover:bg-pink-100'} px-4 py-1.5 rounded-full text-sm font-medium transition shadow-sm whitespace-nowrap" data-sub="${escapeHtml(sub)}">${escapeHtml(sub)}</button>`;
        });
        
        container.innerHTML = tabsHtml;
        
        container.querySelectorAll('.sub-cat-btn').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                currentSubCategoryFilter = e.target.getAttribute('data-sub');
                updateSubCategoryTabs(); 
                renderNotesList();
            });
        });
    }

    async function loadNotes() {
        if (!currentUser || !selectedCategoryId) return;
        const snap = await db.collection('users').doc(currentUser.uid).collection('diaryEntries')
            .where('categoryId', '==', selectedCategoryId).get();
            
        noteEntries = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        noteEntries.sort(function(a, b) {
            const timeA = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
            const timeB = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0;
            return timeB - timeA;
        });
        
        updateSubCategoryTabs();
        renderNotesList();
        
        const cat = categories.find(c => c.id === selectedCategoryId);
        if (cat) {
            selectedCategoryNameSpan.innerHTML = `${cat.icon} ${cat.name}`;
            categoryActionsDiv.classList.remove('hidden');
            
            const isLang = cat.name.includes('ภาษา') || cat.name.includes('แปล') || cat.name.includes('ศัพท์');
            if (isLang) { 
                translationToolContainer.classList.remove('hidden'); 
            } else { 
                translationToolContainer.classList.add('hidden'); 
            }
        }
    }


    // ----------------------------------------------------
    // ส่วนที่ 14: Authentication และการโหลดเริ่มต้น
    // ----------------------------------------------------
    function updateUI(user) {
        if (user) {
            currentUser = user; 
            authButtonsDiv.classList.add('hidden');
            userInfoDiv.classList.remove('hidden'); 
            userInfoDiv.classList.add('flex');
            userEmailSpan.innerText = user.email;
            if (user.photoURL) { 
                userAvatar.src = user.photoURL; 
                userAvatar.classList.remove('hidden'); 
            } else {
                userAvatar.classList.add('hidden');
            }
            loadAppTitle(); 
            loadCategories();
        } else {
            const storageKey = getStorageKeyForNotebook();
            if (storageKey) localStorage.removeItem(storageKey);
            
            currentUser = null; 
            authButtonsDiv.classList.remove('hidden');
            userInfoDiv.classList.add('hidden'); 
            userInfoDiv.classList.remove('flex');
            categories = []; noteEntries = []; selectedCategoryId = null; currentImageBase64 = "";
            
            appTitle.innerText = "My Notebook 🌸";
            categoryTabsContainer.innerHTML = ''; 
            categoryActionsDiv.classList.add('hidden'); 
            translationToolContainer.classList.add('hidden');
            document.getElementById('subCategoryTabsContainer').classList.add('hidden');
            
            notesListContainer.innerHTML = `
                <div class="text-center text-pink-300 py-20 flex flex-col items-center">
                    <i class="fas fa-lock text-6xl mb-4"></i>
                    <p class="text-lg">กรุณาเข้าสู่ระบบเพื่อเปิดสมุดบันทึก 💖</p>
                </div>
            `;
            clearForm();
        }
    }

    async function googleSignIn() {
        try { 
            await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); 
        } catch(e) { 
            console.error(e); 
            alert("เข้าสู่ระบบด้วย Google ไม่สำเร็จค่ะ 😥"); 
        }
    }

    // กำหนด Event Listeners พื้นฐาน
    searchInput.addEventListener('input', function(e) {
        searchTerm = e.target.value; 
        renderNotesList(); 
    });
    
    clearFormBtn.addEventListener('click', clearForm);
    cancelEditBtn.addEventListener('click', clearForm);
    
    addCategoryBtn.addEventListener('click', openCategoryModal);
    confirmCategoryBtn.addEventListener('click', saveCategory);
    closeCategoryX.addEventListener('click', closeCategoryModal);
    
    categoryModal.addEventListener('click', function(e) {
        if (e.target === categoryModal) closeCategoryModal(); 
    });
    
    loginBtn.addEventListener('click', googleSignIn);
    logoutBtn.addEventListener('click', function() {
        auth.signOut();
    });
    
    auth.onAuthStateChanged(updateUI);
    
    // เรียกใช้งาน Mic และ Speaker เมื่อหน้าเว็บโหลดเสร็จ
    window.addEventListener('DOMContentLoaded', () => {
        attachMicEvents();
        attachSpeakerEvents();
    });

</script>
</body>
</html>
