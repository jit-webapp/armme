<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌸 สมุดจดบันทึกของฉัน | My Cute Notebook</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f472b6">
    <link rel="apple-touch-icon" href="icon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { 
            background-color: #fce7f3; 
            background-image: radial-gradient(#f9a8d4 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Kanit', sans-serif; 
        }
        
        .paper-card {
            background: #fff0f5;
            border: 2px dashed #fbcfe8;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(244, 114, 182, 0.2);
        }

        .entry-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 6px solid #f472b6; 
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.85);
        }
        .entry-card:hover { 
            transform: translateY(-3px) scale(1.01); 
            box-shadow: 0 10px 15px -3px rgba(244, 114, 182, 0.2);
            background: rgba(255, 255, 255, 1);
        }

        .btn-primary {
            @apply bg-gradient-to-r from-pink-400 to-rose-400 hover:from-pink-500 hover:to-rose-500 text-white font-medium py-2 px-5 rounded-2xl shadow-lg shadow-pink-200 transition-all duration-200 transform hover:scale-105;
        }
        .btn-outline {
            @apply border-2 border-pink-200 bg-white/70 text-pink-600 hover:bg-pink-50 rounded-2xl px-4 py-2 font-medium transition-all;
        }

        .category-tabs, .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #fbcfe8 transparent;
        }
        .category-tabs::-webkit-scrollbar, .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .category-tabs::-webkit-scrollbar-thumb, .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #fbcfe8; border-radius: 10px; }
        
        .category-tabs { overflow-x: auto; white-space: nowrap; }

        .icon-option {
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 46px;
            height: 46px;
            border-radius: 12px;
        }
        .icon-option:hover { transform: scale(1.2); background: #fce7f3; }
        .icon-option.selected {
            background: #fbcfe8;
            transform: scale(1.2);
            box-shadow: 0 0 0 2px #f472b6;
        }
        
        .mic-btn.recording {
            color: #ef4444 !important;
            animation: pulse 1.5s infinite;
        }

        .loading-spinner {
            display: inline-block;
            width: 1rem; height: 1rem;
            border: 2px solid #fbcfe8; border-top-color: #f472b6;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* อนิเมชันสำหรับ Modal พรีวิว */
        .fade-in-up { animation: fadeInUp 0.3s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body class="text-gray-700 min-h-screen">

<div class="max-w-6xl mx-auto px-4 py-8">
    <div class="flex flex-wrap justify-between items-center mb-8 gap-4">
        <div class="flex items-center gap-4 bg-white/80 p-4 rounded-3xl shadow-sm border border-pink-100 flex-1 min-w-[300px]">
            <div class="bg-pink-100 p-3 rounded-2xl flex-shrink-0">
                <i class="fas fa-heart text-3xl text-pink-500"></i>
            </div>
            <div class="flex-1 w-full">
                <div class="flex items-center gap-2">
                    <h1 id="appTitle" class="text-2xl md:text-3xl font-bold text-rose-500 tracking-wide outline-none border-b-2 border-transparent focus:border-rose-300 transition-colors w-full max-w-[300px] truncate" contenteditable="false">My Notebook 🌸</h1>
                    <button id="editTitleBtn" class="text-pink-300 hover:text-pink-500 bg-white hover:bg-pink-50 rounded-full w-8 h-8 flex items-center justify-center transition shadow-sm border border-pink-100" title="เปลี่ยนชื่อแอป"><i class="fas fa-pen text-xs"></i></button>
                </div>
                <p class="text-sm text-pink-400 font-medium mt-1">สมุดจดบันทึกส่วนตัว สไตล์คิวท์ๆ</p>
            </div>
        </div>
        
        <div class="flex gap-3 items-center">
            <div id="authButtons" class="flex gap-2">
                <button id="loginBtn" class="bg-white border-2 border-pink-100 hover:bg-pink-50 hover:border-pink-300 text-gray-700 font-medium py-2 px-5 rounded-2xl shadow-sm transition-all duration-200 flex items-center gap-3">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google"> เข้าสู่ระบบด้วย Google
                </button>
            </div>
            
            <div id="userInfo" class="hidden items-center gap-3 bg-white/80 px-4 py-2 rounded-full border border-pink-100 shadow-sm">
                <img id="userAvatar" class="w-8 h-8 rounded-full hidden border border-pink-200">
                <span id="userEmail" class="text-sm font-medium truncate max-w-[120px]"></span>
                <button id="logoutBtn" class="text-pink-400 hover:text-pink-600 text-sm font-medium ml-2">ออก</button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-5 xl:col-span-4 space-y-6">
            
            <div class="paper-card p-5">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-semibold text-lg flex items-center gap-2 text-rose-500">
                        <i class="fas fa-folder-open"></i> ชั้นวางสมุด
                    </h2>
                    <div class="flex items-center gap-2">
                        <div id="categoryActions" class="hidden flex gap-1">
                            <button onclick="editCategoryName()" class="w-8 h-8 rounded-full bg-blue-50 text-blue-400 hover:text-blue-600 hover:bg-blue-100 transition shadow-sm" title="เปลี่ยนชื่อสมุด"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteCategory()" class="w-8 h-8 rounded-full bg-red-50 text-red-400 hover:text-red-600 hover:bg-red-100 transition shadow-sm" title="ลบสมุดทิ้ง"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <button id="addCategoryBtn" class="text-sm bg-pink-100 hover:bg-pink-200 px-4 py-1.5 rounded-full flex items-center gap-2 text-pink-600 font-medium transition-colors shadow-sm">
                            <i class="fas fa-plus"></i> เพิ่ม
                        </button>
                    </div>
                </div>
                <div class="category-tabs flex flex-wrap gap-2 pb-2" id="categoryTabsContainer">
                    </div>
            </div>

            <div class="paper-card p-6">
                <h2 class="font-semibold text-xl mb-5 flex items-center gap-2 text-rose-500">
                    <i class="fas fa-pen-fancy"></i> จดบันทึกใหม่ ✨
                </h2>
                
                <form id="noteForm">
                    <input type="hidden" id="editId" value="">
                    
                    <div class="mb-5">
                        <label class="block text-sm font-medium mb-2 text-gray-600">หัวข้อหลัก <span class="text-rose-500">*</span></label>
                        <div class="relative">
                            <input type="text" id="mainTitleField" required class="w-full border-2 border-pink-100 rounded-2xl p-3 pr-10 bg-white focus:outline-none focus:border-pink-400 font-medium text-lg placeholder-pink-200" placeholder="พิมพ์หรือพูดหัวข้อ...">
                            <button type="button" class="mic-btn absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-pink-500 text-lg" data-target="mainTitleField"><i class="fas fa-microphone"></i></button>
                        </div>
                    </div>

                    <hr class="border-pink-100 mb-4">

                    <div class="mb-5">
                        <label class="block text-sm font-medium mb-2 text-gray-600">แนบรูปภาพ (ออปชันเสริม)</label>
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                        <button type="button" id="triggerImageBtn" class="w-full border-2 border-dashed border-pink-200 hover:border-pink-400 bg-white/50 hover:bg-pink-50 text-pink-500 rounded-2xl py-3 flex justify-center items-center gap-2 transition-colors">
                            <i class="fas fa-image"></i> เลือกรูปภาพ
                        </button>
                        
                        <div id="imagePreviewContainer" class="relative hidden mt-3">
                            <img id="imagePreview" class="w-full h-32 object-cover rounded-2xl border-2 border-pink-100 shadow-sm" src="" alt="Preview">
                            <button type="button" id="removeImageBtn" class="absolute top-2 right-2 bg-red-500 hover:bg-red-600 text-white rounded-full w-8 h-8 flex items-center justify-center shadow-md transition transform hover:scale-110" title="ลบรูปภาพ">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>

                    <hr class="border-pink-100 mb-4">

                    <div class="mb-2 flex justify-between items-center">
                        <label class="block text-sm font-medium text-gray-600">รายละเอียด</label>
                        <button type="button" id="addDynamicFieldBtn" class="text-xs bg-pink-50 hover:bg-pink-100 text-pink-600 px-3 py-1 rounded-full flex items-center gap-1 transition-colors">
                            <i class="fas fa-plus-circle"></i> เพิ่มช่อง
                        </button>
                    </div>
                    
                    <div id="dynamicFieldsContainer" class="space-y-3 mb-6">
                        </div>

                    <div class="flex justify-between items-center gap-2 sm:gap-4 mt-6">
                        <button type="button" id="clearFormBtn" class="flex-1 bg-white border-2 border-orange-200 hover:bg-orange-50 text-orange-500 py-3 rounded-2xl flex justify-center items-center gap-1 sm:gap-2 font-medium transition-all shadow-sm text-sm sm:text-base">
                            <i class="fas fa-eraser text-lg sm:text-xl text-orange-400"></i> <span class="hidden sm:inline">ล้าง</span>
                        </button>
                        
                        <button type="button" id="cancelEditBtn" class="hidden flex-1 bg-white border-2 border-gray-200 hover:bg-gray-50 text-gray-500 py-3 rounded-2xl flex justify-center items-center gap-1 sm:gap-2 font-medium transition-all shadow-sm text-sm sm:text-base">
                            <i class="fas fa-times text-lg sm:text-xl text-gray-400"></i> ยกเลิก
                        </button>

                        <button type="submit" class="flex-[1.5] bg-gradient-to-r from-emerald-400 to-teal-400 hover:from-emerald-500 hover:to-teal-500 text-white py-3 rounded-2xl flex justify-center items-center gap-1 sm:gap-2 font-medium transition-all shadow-lg shadow-emerald-200 transform hover:scale-105 text-sm sm:text-lg">
                            <i class="fas fa-save text-lg sm:text-xl"></i> <span id="submitBtnText">บันทึก</span>
                        </button>
                    </div>
                </form>
            </div>

            <div id="translationToolContainer" class="paper-card p-6 hidden">
                <h3 class="font-semibold text-lg flex items-center gap-2 text-sky-500 mb-3">
                    <i class="fas fa-language"></i> ตัวช่วยแปล & ออกเสียง
                </h3>
                <div class="relative mb-3">
                    <textarea id="autoTranslateInput" rows="2" class="w-full border-2 border-pink-100 rounded-2xl p-3 pr-10 bg-white focus:outline-none focus:border-pink-400 resize-none text-sm" placeholder="พิมพ์หรือพูดเพื่อแปล..."></textarea>
                    <button type="button" class="mic-btn absolute right-3 top-3 text-gray-400 hover:text-pink-500" data-target="autoTranslateInput"><i class="fas fa-microphone"></i></button>
                </div>
                <div class="space-y-2 mt-3 text-sm">
                    <div class="bg-blue-50/50 p-3 rounded-xl border border-blue-100 relative min-h-[48px] flex items-center">
                        <div class="flex-1 pr-8"><span class="font-medium text-blue-600 mr-1">🇬🇧 EN:</span><span id="autoEnResult" class="text-gray-700">-</span></div>
                        <button class="absolute right-3 top-1/2 -translate-y-1/2 text-blue-400 hover:text-blue-600 w-8 h-8 flex items-center justify-center rounded-full hover:bg-blue-100 transition" onclick="speakResult('autoEnResult', 'en-US')"><i class="fas fa-volume-up"></i></button>
                    </div>
                    <div class="bg-red-50/50 p-3 rounded-xl border border-red-100 relative min-h-[48px] flex items-center">
                        <div class="flex-1 pr-8"><span class="font-medium text-red-600 mr-1">🇨🇳 ZH:</span><span id="autoZhResult" class="text-gray-700">-</span></div>
                        <button class="absolute right-3 top-1/2 -translate-y-1/2 text-red-400 hover:text-red-600 w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-100 transition" onclick="speakResult('autoZhResult', 'zh-CN')"><i class="fas fa-volume-up"></i></button>
                    </div>
                    <div class="bg-green-50/50 p-3 rounded-xl border border-green-100 relative min-h-[48px] flex items-center">
                        <div class="flex-1 pr-8"><span class="font-medium text-green-600 mr-1">🇹🇭 TH:</span><span id="autoThResult" class="text-gray-700">-</span></div>
                        <button class="absolute right-3 top-1/2 -translate-y-1/2 text-green-400 hover:text-green-600 w-8 h-8 flex items-center justify-center rounded-full hover:bg-green-100 transition" onclick="speakResult('autoThResult', 'th-TH')"><i class="fas fa-volume-up"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 xl:col-span-8 space-y-6">
            <div class="paper-card p-5 h-full">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 bg-white/50 p-3 rounded-2xl border border-pink-50 shadow-sm">
                    <h2 class="font-semibold text-xl flex items-center gap-2 text-rose-500">
                        <i class="fas fa-book-open text-pink-400"></i> 
                        <span id="selectedCategoryName" class="text-gray-800">บันทึกทั้งหมด</span>
                    </h2>

                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <div class="relative flex-1 sm:flex-none">
                            <select id="viewModeSelector" class="w-full appearance-none bg-white border border-pink-200 hover:border-pink-300 rounded-xl px-4 py-2 pr-8 text-sm focus:outline-none text-pink-600 font-medium shadow-sm transition cursor-pointer">
                                <option value="content">📝 รูปแบบเนื้อหา</option>
                                <option value="details">📄 รายละเอียด</option>
                                <option value="tiles">🪟 กระเบื้อง</option>
                                <option value="list">🔠 รายการย่อ</option>
                                <option value="xlarge">🖼️ ไอคอนใหญ่พิเศษ</option>
                                <option value="large">🖼️ ไอคอนใหญ่</option>
                                <option value="medium">🖼️ ไอคอนกลาง</option>
                                <option value="small">🖼️ ไอคอนเล็ก</option>
                            </select>
                            <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-pink-400 pointer-events-none text-xs"></i>
                        </div>

                        <div class="relative flex-1 sm:flex-none">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-pink-300 text-sm"></i>
                            <input type="text" id="searchNote" placeholder="ค้นหาในสมุดนี้..." class="w-full sm:w-48 pl-9 pr-8 py-2 border border-pink-200 rounded-xl text-sm bg-white focus:outline-none focus:border-pink-400 transition-colors shadow-sm">
                            <button type="button" class="mic-btn absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-pink-500" data-target="searchNote" title="ค้นหาด้วยเสียง"><i class="fas fa-microphone text-sm"></i></button>
                        </div>
                    </div>
                </div>
                
                <div id="notesListContainer" class="space-y-4 max-h-[800px] overflow-y-auto pr-2 custom-scrollbar pb-6">
                    <div class="text-center text-pink-300 py-20 flex flex-col items-center">
                        <i class="fas fa-book-heart text-6xl mb-4"></i>
                        <p class="text-lg">เลือกสมุดเพื่อดูบันทึกของคุณ 📝</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="previewModal" class="modal-backdrop hidden fixed inset-0 bg-pink-900/60 backdrop-blur-md flex items-center justify-center z-[70] p-4" onclick="closePreviewModal()">
    <div class="bg-white rounded-[2rem] w-full max-w-2xl shadow-2xl transform transition-all border-4 border-pink-50 max-h-[90vh] flex flex-col fade-in-up" onclick="event.stopPropagation()">
        <div class="p-6 border-b border-pink-50 flex justify-between items-start bg-pink-50/30 rounded-t-[1.8rem]">
            <h2 id="previewModalTitle" class="text-3xl font-bold text-gray-800 flex-1 pr-4 leading-tight">หัวข้อ...</h2>
            <button onclick="closePreviewModal()" class="text-gray-400 hover:text-pink-500 text-2xl transition bg-white w-10 h-10 rounded-full shadow-sm flex items-center justify-center"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="p-6 overflow-y-auto custom-scrollbar flex-1">
            <div id="previewModalImageContainer" class="mb-6 hidden text-center">
                <img id="previewModalImage" src="" class="max-w-full max-h-80 object-contain rounded-2xl mx-auto shadow-md border-2 border-pink-50 cursor-pointer" onclick="openImageViewer(this.src)" title="ดูรูปเต็ม">
            </div>
            <div id="previewModalFields" class="space-y-4">
                </div>
        </div>
        
        <div class="p-4 border-t border-pink-50 bg-gray-50 rounded-b-[1.8rem] flex justify-end">
            <button id="previewEditBtn" class="bg-blue-50 hover:bg-blue-100 text-blue-600 px-6 py-2 rounded-xl font-medium transition shadow-sm flex items-center gap-2"><i class="fas fa-pen"></i> แก้ไขหน้านี้</button>
        </div>
    </div>
</div>

<div id="categoryModal" class="modal-backdrop hidden fixed inset-0 bg-pink-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-[2rem] w-full max-w-sm p-8 shadow-2xl transform transition-all border-4 border-pink-50 flex flex-col items-center relative fade-in-up">
        <button id="closeCategoryX" class="absolute top-6 right-6 text-gray-400 hover:text-pink-500 text-xl"><i class="fas fa-times"></i></button>
        <h3 class="text-2xl font-bold text-rose-500 mb-6">เพิ่มสมุดเล่มใหม่ 📚</h3>
        
        <div class="mb-6 flex flex-col items-center group relative">
            <button type="button" onclick="openGlobalIconPicker('categoryModal')" class="w-28 h-28 bg-pink-50 hover:bg-pink-100 rounded-full border-4 border-pink-200 flex items-center justify-center text-6xl transition-transform hover:scale-105 shadow-sm overflow-hidden z-10">
                <span id="categoryIconPreview">🌸</span>
            </button>
            <div class="absolute -bottom-3 bg-pink-500 text-white text-[10px] px-3 py-1 rounded-full opacity-80 z-20 pointer-events-none">คลิกเพื่อเปลี่ยนรูป</div>
        </div>

        <div class="w-full mb-6 relative">
            <label class="block text-sm font-medium mb-2 text-center text-gray-600">ตั้งชื่อสมุดของคุณ</label>
            <input type="text" id="newCategoryName" class="w-full border-2 border-pink-100 rounded-2xl p-3 pr-10 focus:outline-none focus:border-pink-400 text-center text-lg font-medium text-pink-600" placeholder="พิมพ์ชื่อสมุด...">
            <button type="button" class="mic-btn absolute right-3 bottom-3 text-gray-400 hover:text-pink-500" data-target="newCategoryName"><i class="fas fa-microphone"></i></button>
        </div>

        <button id="confirmCategoryBtn" class="btn-primary w-full py-3 text-lg mt-auto">สร้างสมุดเลย!</button>
    </div>
</div>

<div id="globalIconPickerModal" class="modal-backdrop hidden fixed inset-0 bg-pink-900/60 backdrop-blur-md flex items-center justify-center z-[60] p-4">
    <div class="bg-white rounded-[2rem] w-full max-w-2xl p-6 shadow-2xl transform transition-all border-4 border-pink-50 max-h-[90vh] flex flex-col fade-in-up">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-rose-500"><i class="fas fa-icons mr-2"></i>เลือกไอคอนน่ารักๆ ✨</h3>
            <button id="closeIconPickerX" class="text-gray-400 text-2xl hover:text-pink-500 transition"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex gap-2 overflow-x-auto custom-scrollbar pb-3 mb-2 text-sm" id="iconFilterContainer">
            <button class="icon-filter-btn bg-pink-500 text-white px-4 py-1.5 rounded-full font-medium shadow-sm flex-shrink-0" data-filter="all">🌟 ทั้งหมด</button>
            <button class="icon-filter-btn bg-gray-100 hover:bg-pink-100 text-gray-600 px-4 py-1.5 rounded-full font-medium transition flex-shrink-0" data-filter="faces">😀 อารมณ์</button>
            <button class="icon-filter-btn bg-gray-100 hover:bg-pink-100 text-gray-600 px-4 py-1.5 rounded-full font-medium transition flex-shrink-0" data-filter="nature">🐶 ธรรมชาติ</button>
            <button class="icon-filter-btn bg-gray-100 hover:bg-pink-100 text-gray-600 px-4 py-1.5 rounded-full font-medium transition flex-shrink-0" data-filter="food">🍔 อาหาร</button>
            <button class="icon-filter-btn bg-gray-100 hover:bg-pink-100 text-gray-600 px-4 py-1.5 rounded-full font-medium transition flex-shrink-0" data-filter="activity">⚽️ กิจกรรม</button>
            <button class="icon-filter-btn bg-gray-100 hover:bg-pink-100 text-gray-600 px-4 py-1.5 rounded-full font-medium transition flex-shrink-0" data-filter="travel">✈️ ท่องเที่ยว</button>
            <button class="icon-filter-btn bg-gray-100 hover:bg-pink-100 text-gray-600 px-4 py-1.5 rounded-full font-medium transition flex-shrink-0" data-filter="objects">🎁 สิ่งของ</button>

            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; 
                const MAX_HEIGHT = 800;
                let width = img.width; 
                let height = img.height;
                
                if (width > height) { 
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } 
                } else { 
                    if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } 
                }
                canvas.width = width; 
                canvas.height = height;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                currentImageBase64 = canvas.toDataURL('image/jpeg', 0.7); 
                imagePreview.src = currentImageBase64;
                imagePreviewContainer.classList.remove('hidden');

            img.src = event.target.result;

        reader.readAsDataURL(file);

                const recognition = new SpeechRecognition();
                recognition.lang = 'th-TH'; 
                recognition.interimResults = false;
                recognition.start(); 
                btn.classList.add('recording');
                
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    const currentValue = targetInput.value;
                    targetInput.value = currentValue ? currentValue + " " + transcript : transcript;
                    targetInput.dispatchEvent(new Event('input')); 
                };
                recognition.onend = () => btn.classList.remove('recording');

            });
        });
    }

    // ----------------------------------------------------

    // ----------------------------------------------------
    function detectLanguageBasic(text) {
        if (/[\u0E00-\u0E7F]/.test(text)) return 'th';
        if (/[\u4E00-\u9FFF]/.test(text)) return 'zh'; 
        return 'en';
    }
    
    async function translateText(text, srcLang, tgtLang) {
        if (!text) return "";
        const key = `${srcLang}|${tgtLang}|${text}`;
        if (translationCache[key]) return translationCache[key];
        
        const src = srcLang === 'zh' ? 'zh-CN' : srcLang; 
        const tgt = tgtLang === 'zh' ? 'zh-CN' : tgtLang;
        
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${tgt}&dt=t&q=${encodeURIComponent(text)}`;
        
        try {
            const res = await fetch(url); 
            const data = await res.json();
            if (data && data[0]) {
                let trans = data[0].map(item => item[0]).join('');
                if (trans === text && src !== tgt) trans = null;
                if (trans) translationCache[key] = trans; 
                return trans || "";
            }
            return "";
        } catch(e) { return ""; }
    }
    
    async function autoTranslate() {
        const raw = autoTranslateInput.value.trim();
        if (!raw) { 
            autoEnResult.innerText = "-"; 
            autoZhResult.innerText = "-"; 
            autoThResult.innerText = "-"; 
            return; 
        }
        
        const spinner = '<span class="loading-spinner"></span>';
        autoEnResult.innerHTML = spinner; 
        autoZhResult.innerHTML = spinner; 
        autoThResult.innerHTML = spinner;
        
        const detected = detectLanguageBasic(raw);
        let en = "", zh = "", th = "";
        
        if (detected === 'th') { 
            th = raw; 
            en = await translateText(raw, 'th', 'en'); 
            zh = await translateText(raw, 'th', 'zh'); 
        } else if (detected === 'en') { 
            en = raw; 
            th = await translateText(raw, 'en', 'th'); 
            zh = await translateText(raw, 'en', 'zh'); 
        } else { 
            zh = raw; 
            th = await translateText(raw, 'zh', 'th'); 
            en = await translateText(raw, 'zh', 'en'); 
        }
        
        autoEnResult.innerText = en || "-"; 
        autoZhResult.innerText = zh || "-"; 
        autoThResult.innerText = th || "-";
    }

        });
        
        row.setAttribute('data-selected-color', color);
        row.querySelector('.remove-field-btn').addEventListener('click', () => row.remove());
        return row;
    }

    addDynamicFieldBtn.addEventListener('click', () => {
        dynamicFieldsContainer.appendChild(createFieldRow());
        attachMicEvents();
    });

    function resetDynamicFields() {
        dynamicFieldsContainer.innerHTML = '';
        const currentCat = categories.find(c => c.id === selectedCategoryId);
        
        if (currentCat && currentCat.fieldLabels && currentCat.fieldLabels.length > 0) {
            currentCat.fieldLabels.forEach(item => {
                if (typeof item === 'string') {
                    dynamicFieldsContainer.appendChild(createFieldRow(item, "", "✨", "pink"));
                } else {
                    dynamicFieldsContainer.appendChild(createFieldRow(item.label, "", item.icon, item.color));
                }
            });
        } else {
            dynamicFieldsContainer.appendChild(createFieldRow("รายละเอียด", "", "✨", "pink"));
        }
        attachMicEvents();
    }


    // ----------------------------------------------------
    // ส่วนที่ 11: การทำงานของ View Modes และการแสดงการ์ด
    // ----------------------------------------------------
    viewModeSelector.addEventListener('change', (e) => {
        currentViewMode = e.target.value;
        localStorage.setItem('notebook_view_mode', currentViewMode);
        renderNotesList();
    });

    function renderNotesList() {
        const filtered = noteEntries.filter(entry => {
            const matchTitle = entry.title?.toLowerCase().includes(searchTerm.toLowerCase());
            const matchFields = entry.fields && entry.fields.some(f => 
                (f.label && f.label.toLowerCase().includes(searchTerm.toLowerCase())) || 
                (f.value && f.value.toLowerCase().includes(searchTerm.toLowerCase()))
            );
            return matchTitle || matchFields;
        });

        if (filtered.length === 0) {
            notesListContainer.className = 'max-h-[800px] overflow-y-auto pr-2 custom-scrollbar pb-6';
            notesListContainer.innerHTML = `
                <div class="text-center text-pink-300 py-12">
                    <i class="fas fa-search-minus text-5xl mb-3"></i>
                    <p>ไม่พบบันทึกที่คุณค้นหา 😥</p>
                </div>`;
            return;
        }

        notesListContainer.innerHTML = '';
        
        let gridClass = '';
        if (currentViewMode === 'content') {
            gridClass = 'space-y-4';
        } else if (currentViewMode === 'list') {
            gridClass = 'flex flex-col gap-2';
        } else if (currentViewMode === 'details') {
            gridClass = 'flex flex-col border border-pink-100 rounded-xl overflow-hidden bg-white shadow-sm';
        } else if (currentViewMode === 'tiles') {
            gridClass = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4';
        } else if (currentViewMode === 'xlarge') {
            gridClass = 'grid grid-cols-1 sm:grid-cols-2 gap-6';
        } else if (currentViewMode === 'large') {
            gridClass = 'grid grid-cols-2 sm:grid-cols-3 gap-5';
        } else if (currentViewMode === 'medium') {
            gridClass = 'grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 gap-4';
        } else if (currentViewMode === 'small') {
            gridClass = 'grid grid-cols-4 sm:grid-cols-5 lg:grid-cols-6 gap-3';
        }
        
        notesListContainer.className = `${gridClass} max-h-[800px] overflow-y-auto pr-2 custom-scrollbar pb-6`;

        filtered.forEach(entry => {
            const card = document.createElement('div');
            card.setAttribute('data-id', entry.id);
            card.className = getCardClass(currentViewMode);
            card.innerHTML = generateCardHTML(entry, currentViewMode);
            notesListContainer.appendChild(card);
        });
    }

    function getCardClass(mode) {
        const base = "relative group cursor-pointer transition-all bg-white hover:bg-pink-50/50 ";
        if (mode === 'content') {
            return base + "p-5 rounded-2xl border border-pink-100 shadow-sm hover:shadow-md note-card-item flex flex-col sm:flex-row gap-5";
        }
        if (mode === 'list') {
            return base + "p-3 rounded-xl border border-pink-50 shadow-sm flex items-center gap-3 note-card-item";
        }
        if (mode === 'details') {
            return base + "p-3 border-b border-pink-50 flex items-center justify-between note-card-item rounded-none shadow-none";
        }
        if (mode === 'tiles') {
            return base + "p-4 rounded-xl border border-pink-100 shadow-sm flex items-center gap-4 note-card-item h-28";
        }
        return base + "p-3 sm:p-4 rounded-xl border border-pink-100 shadow-sm flex flex-col items-center text-center note-card-item h-full";
    }

    function generateCardHTML(entry, mode) {
        const title = escapeHtml(entry.title || 'ไม่มีหัวข้อ');
        const icon = entry.fields?.[0]?.icon || '✨';
        const imgDisplay = entry.image 
            ? `<img src="${entry.image}" class="w-full h-full object-cover">`
            : `<div class="w-full h-full bg-pink-50 flex items-center justify-center text-opacity-50"><span class="scale-150">${icon}</span></div>`;
        
        const btnHTML = `
            <div class="flex gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity ${mode === 'details' || mode === 'list' ? '' : 'absolute right-2 top-2 bg-white/90 p-1 rounded-lg backdrop-blur-sm shadow-sm border border-pink-50'}">
                <button class="edit-note w-8 h-8 rounded-md text-blue-400 hover:bg-blue-50 hover:text-blue-600 flex items-center justify-center transition" data-id="${entry.id}">
                    <i class="fas fa-pen text-sm pointer-events-none"></i>
                </button>
                <button class="delete-note w-8 h-8 rounded-md text-red-400 hover:bg-red-50 hover:text-red-600 flex items-center justify-center transition" data-id="${entry.id}">
                    <i class="fas fa-trash-alt text-sm pointer-events-none"></i>
                </button>
            </div>
        `;

        if (mode === 'content') {
            let fieldsHtml = '';
            if (entry.fields && entry.fields.length > 0) {
                fieldsHtml = `<div class="mt-4 space-y-3 border-t border-pink-100 pt-4">`;
                entry.fields.forEach(f => {
                    if (f.label || f.value) {
                        const colorCode = f.color || 'pink';
                        const colorStyle = colorMap[colorCode] || colorMap['pink'];
                        const iconHtml = f.icon ? `<span class="mr-1.5 text-lg">${escapeHtml(f.icon)}</span>` : '';

                        fieldsHtml += `
                            <div class="text-sm">
                                ${f.label ? `<span class="font-medium ${colorStyle.badgeBg} ${colorStyle.badgeText} px-2.5 py-1 rounded-lg inline-flex items-center mb-1.5 shadow-sm">${iconHtml}${escapeHtml(f.label)}</span>` : ''}
                                <div class="text-gray-700 pl-1 whitespace-pre-wrap leading-relaxed">${escapeHtml(f.value)}</div>
                            </div>`;
                    }
                });
                fieldsHtml += `</div>`;
            }
            let imageHtml = '';
            if (entry.image) {
                imageHtml = `<div class="w-full sm:w-40 h-40 flex-shrink-0 mt-3 sm:mt-0 rounded-xl overflow-hidden border border-pink-100 shadow-sm">${imgDisplay}</div>`;
            }

            return `
                <div class="flex-1 pr-4 min-w-0">
                    <div class="font-bold text-xl text-gray-800 flex items-center gap-2 truncate">✨ ${title}</div>
                    ${fieldsHtml}
                </div>
                ${imageHtml}
                ${btnHTML}
            `;
        }
        
        if (mode === 'list') {
            return `
                <div class="w-10 h-10 rounded-lg overflow-hidden flex-shrink-0 border border-pink-100">${imgDisplay}</div>
                <div class="flex-1 font-bold text-gray-800 truncate text-base">${title}</div>
                ${btnHTML}
            `;
        }

        if (mode === 'details') {
            const date = entry.createdAt?.toDate ? entry.createdAt.toDate().toLocaleDateString('th-TH') : '-';
            const fCount = entry.fields ? entry.fields.length : 0;
            return `
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <div class="w-8 h-8 rounded overflow-hidden flex-shrink-0 border border-pink-50">${imgDisplay}</div>
                    <div class="font-semibold text-gray-800 truncate flex-1">${title}</div>
                    <div class="text-xs text-gray-400 hidden md:block w-24 text-right pr-4">${fCount} หัวข้อย่อย</div>
                    <div class="text-xs text-gray-400 hidden sm:block w-24">${date}</div>
                </div>
                ${btnHTML}
            `;
        }

        if (mode === 'tiles') {
            const subtext = entry.fields?.[0]?.value || (entry.fields?.length + " รายการ");
            return `
                <div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 border border-pink-100 shadow-inner">${imgDisplay}</div>
                <div class="flex-1 min-w-0 flex flex-col justify-center">
                    <div class="font-bold text-gray-800 truncate text-base mb-1">${title}</div>
                    <div class="text-xs text-gray-500 truncate">${escapeHtml(subtext)}</div>
                </div>
                ${btnHTML}
            `;
        }

        let sizeClass = "w-12 h-12 text-3xl"; 
        if(mode === 'xlarge') sizeClass = "w-32 h-32 sm:w-48 sm:h-48 text-6xl";
        if(mode === 'large') sizeClass = "w-24 h-24 sm:w-32 sm:h-32 text-5xl";
        if(mode === 'medium') sizeClass = "w-16 h-16 sm:w-24 sm:h-24 text-4xl";
        
        return `
            <div class="${sizeClass} rounded-2xl overflow-hidden mb-3 border border-pink-100 shadow-sm flex items-center justify-center bg-pink-50">
                ${imgDisplay}
            </div>
            <div class="font-semibold text-gray-800 truncate w-full text-sm sm:text-base">${title}</div>
            ${btnHTML}
        `;
    }

    // Event Delegation ควบคุมการคลิกบนรายการบันทึก
    notesListContainer.addEventListener('click', (e) => {
        const editBtn = e.target.closest('.edit-note');
        const delBtn = e.target.closest('.delete-note');
        const card = e.target.closest('.note-card-item');

        if (editBtn) {

            const entry = noteEntries.find(entry => entry.id === editBtn.dataset.id);

                    loadNotes();
                });

            openPreviewModal(card.dataset.id);
        }
    });

    // ส่วนที่ 12: การจัดการฟอร์มแก้ไขและบันทึก

    function fillFormForEdit(entry) {
        editIdInput.value = entry.id;
        mainTitleField.value = entry.title || '';
        
        if (entry.image) {
            currentImageBase64 = entry.image;
            imagePreview.src = currentImageBase64;
            imagePreviewContainer.classList.remove('hidden');
            triggerImageBtn.classList.add('hidden');
        } else {
            currentImageBase64 = "";
            imageInput.value = "";
            imagePreviewContainer.classList.add('hidden');
            triggerImageBtn.classList.remove('hidden');
        }

        dynamicFieldsContainer.innerHTML = ''; 
        if (entry.fields && entry.fields.length > 0) {
            entry.fields.forEach(f => dynamicFieldsContainer.appendChild(createFieldRow(f.label, f.value, f.icon || "✨", f.color || "pink")));
        } else {
            resetDynamicFields();
        }
        
        cancelEditBtn.classList.remove('hidden');
        submitBtnText.innerText = "อัปเดต";
        attachMicEvents();
    }

    function clearForm() {
        editIdInput.value = '';
        mainTitleField.value = '';
        currentImageBase64 = "";
        imageInput.value = "";
        imagePreviewContainer.classList.add('hidden');
        triggerImageBtn.classList.remove('hidden');

        resetDynamicFields();
        cancelEditBtn.classList.add('hidden');
        submitBtnText.innerText = "บันทึก";
    }

    async function saveNoteEntry(e) {
        e.preventDefault();
        if (!currentUser) { alert("กรุณาเข้าสู่ระบบก่อนจดบันทึกน้า 💖"); return; }
        if (!selectedCategoryId) { alert("เลือกสมุดก่อนนะคะ 📚"); return; }
        
        const title = mainTitleField.value.trim();
        if (!title) { alert("อย่าลืมตั้งหัวข้อหลักด้วยนะคะ ✨"); return; }

        const fields = [];
        const currentLabels = [];
        const rows = document.querySelectorAll('.dynamic-field-row');
        rows.forEach(row => {
            const label = row.querySelector('.field-label').value.trim();
            const value = row.querySelector('.field-value').value.trim();
            const iconBtn = row.querySelector('.field-icon-btn');
            const icon = iconBtn ? iconBtn.getAttribute('data-icon') : "✨";
            const color = row.getAttribute('data-selected-color') || "pink";

            if (label || value) { 
                fields.push({ label, value, icon, color });
                if (label && !currentLabels.some(l => l.label === label)) {
                    currentLabels.push({ label, icon, color });
                }
            }
        });

        const data = {
            title,
            fields,
            image: currentImageBase64,
            categoryId: selectedCategoryId,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        const id = editIdInput.value;
        try {
            const submitBtn = noteForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> รอแป๊บ...';
            submitBtn.disabled = true;

            if (id) {
                await db.collection('users').doc(currentUser.uid).collection('diaryEntries').doc(id).update(data);
            } else {
                data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection('users').doc(currentUser.uid).collection('diaryEntries').add(data);
            }
            
            if (currentLabels.length > 0) {
                await db.collection('users').doc(currentUser.uid).collection('diaryCategories').doc(selectedCategoryId).update({
                    fieldLabels: currentLabels
                });
                const catIndex = categories.findIndex(c => c.id === selectedCategoryId);
                if (catIndex > -1) categories[catIndex].fieldLabels = currentLabels;
            }
            
            clearForm();
            loadNotes();
            
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        } catch(err) {
            console.error(err);
            alert("บันทึกไม่สำเร็จ อาจเป็นเพราะรูปภาพใหญ่เกินไป ลองเลือกรูปใหม่ดูนะคะ 🥺");
        }
    }

    // ส่วนที่ 13: การจัดการสมุดหมวดหมู่
    // ----------------------------------------------------
    function openCategoryModal() {
        if (!currentUser) { 
            alert("กรุณาเข้าสู่ระบบก่อนสร้างสมุดนะคะ 💖"); 
            return; 
        }
        newCategoryNameInput.value = '';
        selectedIcon = "🌸"; 
        if(categoryIconPreview) categoryIconPreview.innerText = "🌸";
        categoryModal.classList.remove('hidden');
    }

    function closeCategoryModal() { 
        categoryModal.classList.add('hidden'); 
    }

    async function addCategory() {
        if (!currentUser) { alert("กรุณาเข้าสู่ระบบก่อนสร้างสมุดนะคะ 💖"); return; }
        const name = newCategoryNameInput.value.trim();
        if (!name) { alert("ตั้งชื่อสมุดสักหน่อยนะคะ 🥺"); return; }
        
        let defaultFields = [{label: "รายละเอียด", icon: "✨", color: "pink"}];
        if (name.includes('ภาษา') || name.includes('แปล') || name.includes('ศัพท์')) { 
            defaultFields = [
                {label: "คำศัพท์", icon: "💬", color: "blue"}, 
                {label: "คำอ่าน", icon: "🗣️", color: "emerald"}, 
                {label: "ความหมาย", icon: "📖", color: "pink"}
            ]; 
        }
        
        const newCat = { name, icon: selectedIcon, fieldLabels: defaultFields, createdAt: firebase.firestore.FieldValue.serverTimestamp() };
        const ref = await db.collection('users').doc(currentUser.uid).collection('diaryCategories').add(newCat);
        
        categories.push({ id: ref.id, name, icon: selectedIcon, fieldLabels: defaultFields });
        
        // เมื่อสร้างหมวดหมู่ใหม่ ให้ตั้งเป็นหมวดหมู่ที่ถูกเลือกและบันทึกลง LocalStorage ด้วย
        selectedCategoryId = ref.id; 
        localStorage.setItem('last_selected_notebook', ref.id);
        
        renderCategoryTabs(); 
        loadNotes(); 
        clearForm(); 
        closeCategoryModal();
    }

    async function loadCategories() {
        if (!currentUser) return;
        const snap = await db.collection('users').doc(currentUser.uid).collection('diaryCategories').orderBy('createdAt').get();
        categories = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        if (categories.length === 0) {
            const batch = db.batch();
            const catRef1 = db.collection('users').doc(currentUser.uid).collection('diaryCategories').doc();
            batch.set(catRef1, { name: "สมุดโน้ตทั่วไป", icon: "🌸", fieldLabels: [{label: "รายละเอียด", icon: "✨", color: "pink"}], createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            
            const catRef2 = db.collection('users').doc(currentUser.uid).collection('diaryCategories').doc();
            batch.set(catRef2, { name: "สมุดจดภาษา", icon: "🌐", fieldLabels: [{label: "คำศัพท์", icon: "💬", color: "blue"}, {label: "คำอ่าน", icon: "🗣️", color: "emerald"}, {label: "ความหมาย", icon: "📖", color: "pink"}], createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            
            await batch.commit();
            categories = [
                { id: catRef1.id, name: "สมุดโน้ตทั่วไป", icon: "🌸", fieldLabels: [{label: "รายละเอียด", icon: "✨", color: "pink"}] },
                { id: catRef2.id, name: "สมุดจดภาษา", icon: "🌐", fieldLabels: [{label: "คำศัพท์", icon: "💬", color: "blue"}, {label: "คำอ่าน", icon: "🗣️", color: "emerald"}, {label: "ความหมาย", icon: "📖", color: "pink"}] }
            ];
        }
        
        // คืนค่าสมุดที่เปิดล่าสุดจาก LocalStorage (ถ้ามีและยังอยู่ใน categories)
        const savedCategoryId = localStorage.getItem('last_selected_notebook');
        if (savedCategoryId && categories.some(c => c.id === savedCategoryId)) {
            selectedCategoryId = savedCategoryId;
        } else if (!selectedCategoryId && categories.length > 0) {
            selectedCategoryId = categories[0].id;
        }
        
        renderCategoryTabs();
        if (selectedCategoryId) { loadNotes(); resetDynamicFields(); }
    }

    function renderCategoryTabs() {
        categoryTabsContainer.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            const isSelected = selectedCategoryId === cat.id;
            btn.className = `flex items-center gap-2 px-4 py-2 rounded-2xl text-sm font-medium transition-all duration-200 border-2 shadow-sm flex-shrink-0 ${
                isSelected ? 'bg-pink-100 border-pink-300 text-pink-700 transform scale-105' : 'bg-white border-transparent text-gray-600 hover:bg-pink-50'
            }`;
            btn.innerHTML = `<span class="text-xl">${cat.icon || '🌸'}</span> <span class="whitespace-nowrap">${cat.name}</span>`;
            btn.onclick = () => {
                selectedCategoryId = cat.id;
                
                // บันทึกการเลือกหมวดหมู่ลง LocalStorage
                localStorage.setItem('last_selected_notebook', cat.id);
                
                renderCategoryTabs();
                loadNotes();
                clearForm();
            };
            categoryTabsContainer.appendChild(btn);
        });
    }

    async function editCategoryName() {
        if (!selectedCategoryId) return;
        const cat = categories.find(c => c.id === selectedCategoryId);
        const newName = prompt("แก้ไขชื่อสมุด:", cat.name);
        if (newName && newName.trim() !== "" && newName.trim() !== cat.name) {
            await db.collection('users').doc(currentUser.uid).collection('diaryCategories').doc(selectedCategoryId).update({ name: newName.trim() });
            cat.name = newName.trim();
            renderCategoryTabs(); loadNotes(); 
        }
    }

    async function deleteCategory() {
        if (!selectedCategoryId) return;
        if (!confirm("⚠️ แน่ใจไหมว่าจะลบสมุดเล่มนี้?\nบันทึกทุกหน้าในสมุดเล่มนี้จะหายไปทั้งหมดเลยนะ 🥺")) return;
        
        const notesSnap = await db.collection('users').doc(currentUser.uid).collection('diaryEntries').where('categoryId', '==', selectedCategoryId).get();
        const batch = db.batch();
        notesSnap.forEach(doc => { batch.delete(doc.ref); });
        
        batch.delete(db.collection('users').doc(currentUser.uid).collection('diaryCategories').doc(selectedCategoryId));
        await batch.commit();
        
        selectedCategoryId = null; 
        
        // ลบค่าใน LocalStorage เมื่อสมุดถูกลบ
        localStorage.removeItem('last_selected_notebook');
        
        categoryActionsDiv.classList.add('hidden'); 
        translationToolContainer.classList.add('hidden');
        loadCategories();
    }

    async function loadNotes() {
        if (!currentUser || !selectedCategoryId) return;
        const snap = await db.collection('users').doc(currentUser.uid).collection('diaryEntries')
            .where('categoryId', '==', selectedCategoryId).get();
            
        noteEntries = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        noteEntries.sort((a, b) => {
            const timeA = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
            const timeB = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0;
            return timeB - timeA;
        });
        
        renderNotesList();
        
        const cat = categories.find(c => c.id === selectedCategoryId);
        if (cat) {
            selectedCategoryNameSpan.innerHTML = `${cat.icon} ${cat.name}`;
            categoryActionsDiv.classList.remove('hidden');
            
            const isLang = cat.name.includes('ภาษา') || cat.name.includes('แปล') || cat.name.includes('ศัพท์');
            if (isLang) { translationToolContainer.classList.remove('hidden'); } 
            else { translationToolContainer.classList.add('hidden'); }
        }
    }


    // ----------------------------------------------------
    // ส่วนที่ 14: Authentication และการโหลดเริ่มต้น
    // ----------------------------------------------------
    function updateUI(user) {
        if (user) {
            currentUser = user; 
            authButtonsDiv.classList.add('hidden');
            userInfoDiv.classList.remove('hidden'); 
            userInfoDiv.classList.add('flex');
            userEmailSpan.innerText = user.email;
            if (user.photoURL) { 
                userAvatar.src = user.photoURL; 
                userAvatar.classList.remove('hidden'); 
            } else {
                userAvatar.classList.add('hidden');
            }
            loadAppTitle(); 
            loadCategories();
        } else {
            currentUser = null; 
            authButtonsDiv.classList.remove('hidden');
            userInfoDiv.classList.add('hidden'); 
            userInfoDiv.classList.remove('flex');
            categories = []; noteEntries = []; selectedCategoryId = null; currentImageBase64 = "";
            
            // ลบการจำสมุดล่าสุดเมื่อล็อกเอาต์
            localStorage.removeItem('last_selected_notebook');
            
            appTitle.innerText = "My Notebook 🌸";
            categoryTabsContainer.innerHTML = ''; 
            categoryActionsDiv.classList.add('hidden'); 
            translationToolContainer.classList.add('hidden');
            notesListContainer.innerHTML = `
                <div class="text-center text-pink-300 py-20 flex flex-col items-center">
                    <i class="fas fa-lock text-6xl mb-4"></i>
                    <p class="text-lg">กรุณาเข้าสู่ระบบเพื่อเปิดสมุดบันทึก 💖</p>
                </div>
            `;
            clearForm();
        }
    }

    async function googleSignIn() {
        try { 
            await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); 
        } catch(e) { 
            console.error(e); 
            alert("เข้าสู่ระบบด้วย Google ไม่สำเร็จค่ะ 😥"); 
        }
    }

    searchInput.addEventListener('input', (e) => { 
        searchTerm = e.target.value; 
        renderNotesList(); 
    });
    
    noteForm.addEventListener('submit', saveNoteEntry);
    clearFormBtn.addEventListener('click', clearForm);
    cancelEditBtn.addEventListener('click', clearForm);
    
    addCategoryBtn.addEventListener('click', openCategoryModal);
    confirmCategoryBtn.addEventListener('click', addCategory);
    closeCategoryX.addEventListener('click', closeCategoryModal);
    categoryModal.addEventListener('click', (e) => { 
        if (e.target === categoryModal) closeCategoryModal(); 
    });
    
    loginBtn.addEventListener('click', googleSignIn);
    logoutBtn.addEventListener('click', () => auth.signOut());
    
    auth.onAuthStateChanged(updateUI);
    attachMicEvents();

</script>
</body>
</html>
